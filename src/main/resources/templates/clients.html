<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Clients - CASA Legal Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container">

    <div id="successMsg" class="success-msg" style="display:none;"></div>
    <div id="errorMsg" class="error-msg" style="display:none;"></div>

    <div class="card" id="formCard">
        <h2 id="formTitle">➕ Register New Client</h2>
        <form id="clientForm">

            <!-- Personal Information -->
            <div class="form-section-title">👤 Personal Information</div>
            <div class="two-col">
                <div>
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" placeholder="Enter full name">
                    <span class="field-error" id="err-fullName"></span>

                    <label for="idNumber">National ID Number *</label>
                    <input type="text" id="idNumber" placeholder="16-digit national ID" maxlength="16" inputmode="numeric">
                    <span class="hint">Must be exactly 16 digits — <span id="idCount" style="font-weight:bold;color:#e74c3c;">0</span>/16 entered</span>
                    <span class="field-error" id="err-idNumber"></span>

                    <label for="gender">Gender</label>
                    <select id="gender">
                        <option value="">-- Select --</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>

                    <label for="nationality">Nationality</label>
                    <input type="text" id="nationality" placeholder="e.g. Rwandan">
                </div>
                <div>
                    <label for="phone">Phone Number *</label>
                    <input type="text" id="phone" placeholder="10-digit phone number" maxlength="10" inputmode="numeric">
                    <span class="hint">Must be exactly 10 digits — <span id="phoneCount" style="font-weight:bold;color:#e74c3c;">0</span>/10 entered</span>
                    <span class="field-error" id="err-phone"></span>

                    <label for="email">Email (optional)</label>
                    <input type="text" id="email" placeholder="Enter email or leave blank">
                    <span class="hint">Leave blank if no email — will be saved as "-"</span>
                    <span class="field-error" id="err-email"></span>

                    <label for="serviceType">Service Required</label>
                    <select id="serviceType">
                        <option value="">-- Select Service --</option>
                        <option>Notary Service</option>
                        <option>Mediation</option>
                        <option>Legal Consultation</option>
                        <option>Legal Representation</option>
                    </select>

                    <label for="clientStatus">Status</label>
                    <select id="clientStatus">
                        <option>Active</option>
                        <option>Inactive</option>
                    </select>
                </div>
            </div>

            <!-- Address -->
            <div class="form-section-title">📍 Client Address</div>
            <div class="two-col">
                <div>
                    <label for="province">Province *</label>
                    <select id="province">
                        <option value="">-- Select Province --</option>
                        <option>Kigali City</option>
                        <option>Northern Province</option>
                        <option>Southern Province</option>
                        <option>Eastern Province</option>
                        <option>Western Province</option>
                    </select>
                    <span class="field-error" id="err-province"></span>

                    <label for="district">District *</label>
                    <input type="text" id="district" placeholder="Enter district">
                    <span class="field-error" id="err-district"></span>

                    <label for="sector">Sector *</label>
                    <input type="text" id="sector" placeholder="Enter sector">
                    <span class="field-error" id="err-sector"></span>
                </div>
                <div>
                    <label for="cell">Cell *</label>
                    <input type="text" id="cell" placeholder="Enter cell">
                    <span class="field-error" id="err-cell"></span>

                    <label for="village">Village *</label>
                    <input type="text" id="village" placeholder="Enter village">
                    <span class="field-error" id="err-village"></span>
                </div>
            </div>

            <br>
            <div style="display:flex; justify-content:flex-end;">
                <button type="submit">💾 Save Client</button>
                <button type="button" class="btn-cancel" onclick="cancelEdit()">✖ Cancel</button>
            </div>
        </form>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin-bottom:0; border-bottom:none; padding-bottom:0;">👥 All Clients</h2>
            <input type="text" class="search-input" id="searchInput" placeholder="Search by name, ID or phone..." onkeyup="searchClients()">
        </div>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Full Name</th>
                        <th>National ID</th>
                        <th>Phone</th>
                        <th>Address</th>
                        <th>Service</th>
                        <th>Status</th>
                        <th>Registered</th>
                        <th style="text-align:right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="clientTableBody"></tbody>
            </table>
        </div>
    </div>

</div>


<script src="/js/script.js"></script>
</body>
</html>
