<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Clients - CASA Legal Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-section-title {
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 25px 0 15px;
            padding: 10px 15px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .hint {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
            margin-bottom: 15px;
            display: block;
            font-style: italic;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        .btn-cancel {
            background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
        }
        .search-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 15px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
        }
        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #f8f9fa;
            font-size: 14px;
        }
        tr:hover {
            background-color: #f8f9fa;
        }
        .field-error {
            color: #e74c3c;
            font-size: 12px;
            margin-top: -10px;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container">

    <div id="successMsg" class="success-msg" style="display:none;"></div>
    <div id="errorMsg" class="error-msg" style="display:none;"></div>

    <div class="card">
        <h2 id="formTitle">➕ Register New Client</h2>
        <form id="clientForm">

            <!-- Personal Information -->
            <div class="form-section-title">👤 Personal Information</div>
            <div class="two-col">
                <div>
                    <label>Full Name *</label>
                    <input type="text" id="fullName" placeholder="Enter full name">
                    <span class="field-error" id="err-fullName"></span>

                    <label>National ID Number *</label>
                    <input type="text" id="idNumber" placeholder="16-digit national ID" maxlength="16" inputmode="numeric">
                    <span class="hint">Must be exactly 16 digits — <span id="idCount" style="font-weight:bold;color:#e74c3c;">0</span>/16 entered</span>
                    <span class="field-error" id="err-idNumber"></span>

                    <label>Gender</label>
                    <select id="gender" style="width:55%;">
                        <option value="">-- Select --</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>

                    <label>Nationality</label>
                    <input type="text" id="nationality" placeholder="e.g. Rwandan">
                </div>
                <div>
                    <label>Phone Number *</label>
                    <input type="text" id="phone" placeholder="10-digit phone number" maxlength="10" inputmode="numeric">
                    <span class="hint">Must be exactly 10 digits — <span id="phoneCount" style="font-weight:bold;color:#e74c3c;">0</span>/10 entered</span>
                    <span class="field-error" id="err-phone"></span>

                    <label>Email (optional)</label>
                    <input type="text" id="email" placeholder="Enter email or leave blank">
                    <span class="hint">Leave blank if no email — will be saved as "-"</span>
                    <span class="field-error" id="err-email"></span>

                    <label>Service Required</label>
                    <select id="serviceType" style="width:55%;">
                        <option value="">-- Select Service --</option>
                        <option>Notary Service</option>
                        <option>Mediation</option>
                        <option>Legal Consultation</option>
                        <option>Legal Representation</option>
                    </select>

                    <label>Status</label>
                    <select id="clientStatus" style="width:55%;">
                        <option>Active</option>
                        <option>Inactive</option>
                    </select>
                </div>
            </div>

            <!-- Address -->
            <div class="form-section-title">📍 Client Address</div>
            <div class="two-col">
                <div>
                    <label>Province *</label>
                    <select id="province" style="width:55%;">
                        <option value="">-- Select Province --</option>
                        <option>Kigali City</option>
                        <option>Northern Province</option>
                        <option>Southern Province</option>
                        <option>Eastern Province</option>
                        <option>Western Province</option>
                    </select>
                    <span class="field-error" id="err-province"></span>

                    <label>District *</label>
                    <input type="text" id="district" placeholder="Enter district">
                    <span class="field-error" id="err-district"></span>

                    <label>Sector *</label>
                    <input type="text" id="sector" placeholder="Enter sector">
                    <span class="field-error" id="err-sector"></span>
                </div>
                <div>
                    <label>Cell *</label>
                    <input type="text" id="cell" placeholder="Enter cell">
                    <span class="field-error" id="err-cell"></span>

                    <label>Village *</label>
                    <input type="text" id="village" placeholder="Enter village">
                    <span class="field-error" id="err-village"></span>
                </div>
            </div>

            <br>
            <button type="submit">💾 Save Client</button>
            <button type="button" class="btn-cancel" onclick="cancelEdit()">✖ Cancel</button>
        </form>
    </div>

    <div class="card">
        <h2>👥 All Clients</h2>
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search by name..." onkeyup="searchClients()">
        <br><br>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Full Name</th>
                    <th>National ID</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th>Service</th>
                    <th>Status</th>
                    <th>Registered</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="clientTableBody"></tbody>
        </table>
    </div>

</div>

<!-- Confirm Modal -->
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <p id="confirmMessage">Are you sure?</p>
        <div class="confirm-actions">
            <button class="btn-confirm-yes" id="confirmYes">Yes, Delete</button>
            <button class="btn-confirm-no" id="confirmNo">Cancel</button>
        </div>
    </div>
</div>

<script src="/js/script.js"></script>
</body>
</html>
