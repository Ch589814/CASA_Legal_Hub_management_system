spring.application.name=CASA_Legal_Hub_management_system

# DATABASE (NEON POSTGRESQL - REQUIRED FOR HF)
spring.datasource.url=jdbc:postgresql://ep-steep-credit-aqw1sksb-pooler.c-8.us-east-1.aws.neon.tech/CASA_Legal_Hub?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# FILE UPLOAD
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
file.upload-dir=uploads

# HUGGING FACE IMPORTANT
server.port=${PORT:7860}
server.address=0.0.0.0