<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Documents - CASA Legal Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 15px;
            padding: 5px;
        }
        .tab {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #667eea;
            border-radius: 10px;
            transition: all 0.3s ease;
            flex: 1;
            text-align: center;
        }
        .tab:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        .category-badge {
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }
        .cat-client {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        }
        .cat-case {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
        }
        .cat-staff {
            background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%);
        }
        .hint {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
            margin-bottom: 15px;
            display: block;
            font-style: italic;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 14px;
        }
        input, select, textarea {
            padding: 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            margin-bottom: 15px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        .btn-cancel {
            background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
        }
        .search-input {
            width: 60%;
            padding: 15px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 15px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #f8f9fa;
            font-size: 14px;
        }
        tr:hover {
            background-color: #f8f9fa;
        }
        .success-msg, .error-msg {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .success-msg {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
        }
        .error-msg {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }
        #clientSection {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container">

    <div id="successMsg" class="success-msg" style="display:none;"></div>
    <div id="errorMsg" class="error-msg" style="display:none;"></div>

    <div class="card">
        <h2>📄 Upload Document</h2>

        <form id="uploadForm">

            <label>Document Category *</label>
            <select id="docCategory" style="width:55%;" onchange="handleCategoryChange()">
                <option value="Client Document">📋 Client Document</option>
                <option value="Case Document">📁 Case Document</option>
                <option value="Staff Resource">👤 Staff Resource</option>
            </select>
            <span class="hint">Staff Resource = internal documents not linked to any client or case</span>

            <div id="clientSection">
                <label>Client <span id="clientRequired">*</span></label>
                <select id="docClientId" style="width:55%;">
                    <option value="">-- Select Client --</option>
                    <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.fullName}"></option>
                </select>
            </div>

            <label>Select File *</label>
            <input type="file" id="docFile" accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.txt" style="width:55%; padding:8px; border:1px solid #ccc; border-radius:5px;">
            <span style="font-size:11px; color:#95a5a6; display:block; margin-bottom:10px;">Allowed: PDF, Word, Excel, Images, Text (max 20MB)</span>

            <label>File Type</label>
            <select id="docFileType" style="width:55%;">
                <option>ID Document</option>
                <option>Court Order</option>
                <option>Contract</option>
                <option>Affidavit</option>
                <option>Invoice</option>
                <option>Legal Notice</option>
                <option>Policy Document</option>
                <option>Template</option>
                <option>Reference Material</option>
                <option>Other</option>
            </select>

            <label>Description (optional)</label>
            <textarea id="docDescription" placeholder="Brief description of this document..." style="width:55%; height:70px;"></textarea>

            <br>
            <button type="submit">📤 Save Document</button>
            <button type="button" class="btn-cancel" onclick="resetForm()">✖ Cancel</button>
        </form>
    </div>

    <div class="card">
        <h2>📂 All Documents</h2>

        <div class="tabs">
            <div class="tab active" onclick="filterTab('all', this)">📂 All</div>
            <div class="tab" onclick="filterTab('Client Document', this)">📋 Client Documents</div>
            <div class="tab" onclick="filterTab('Case Document', this)">📁 Case Documents</div>
            <div class="tab" onclick="filterTab('Staff Resource', this)">👤 Staff Resources</div>
        </div>

        <input type="text" class="search-input" id="docSearch"
               placeholder="🔍 Search by file name, type, client or description..."
               oninput="searchDocuments()" style="width:60%; margin-bottom:14px;">

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Category</th>
                    <th>File Name</th>
                    <th>Type</th>
                    <th>Client</th>
                    <th>Description</th>
                    <th>Upload Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="documentTableBody"></tbody>
        </table>
    </div>

</div>

<!-- Confirm Modal -->
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <p id="confirmMessage">Are you sure?</p>
        <div class="confirm-actions">
            <button class="btn-confirm-yes" id="confirmYes">Yes, Delete</button>
            <button class="btn-confirm-no" id="confirmNo">Cancel</button>
        </div>
    </div>
</div>

<script src="/js/documents.js"></script>
</body>
</html>
