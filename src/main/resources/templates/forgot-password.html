<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password - CASA Legal Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { margin:0; padding:0; background:linear-gradient(135deg,#1a252f 0%,#2c3e50 50%,#34495e 100%); min-height:100vh; display:flex; flex-direction:column; }
        .auth-wrapper { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
        .auth-box { background:white; border-radius:12px; box-shadow:0 10px 40px rgba(0,0,0,0.3); padding:44px 50px; width:100%; max-width:420px; }
        .auth-logo { text-align:center; font-size:40px; margin-bottom:6px; }
        .auth-title { text-align:center; font-size:22px; font-weight:bold; color:#2c3e50; margin-bottom:4px; }
        .auth-sub { text-align:center; color:#7f8c8d; font-size:13px; margin-bottom:28px; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-weight:bold; color:#555; margin-bottom:6px; font-size:14px; }
        .form-group input { width:100%; padding:11px 14px; border:1px solid #ddd; border-radius:6px; font-size:14px; box-sizing:border-box; }
        .form-group input:focus { outline:none; border-color:#3498db; }
        .btn-submit { width:100%; background:#3498db; color:white; padding:13px; border:none; border-radius:6px; font-size:16px; font-weight:bold; cursor:pointer; }
        .btn-submit:hover { background:#2980b9; }
        .alert-error { background:#f8d7da; color:#721c24; padding:10px 14px; border-radius:6px; margin-bottom:18px; font-size:14px; border:1px solid #f5c6cb; }
        .alert-success { background:#d4edda; color:#155724; padding:10px 14px; border-radius:6px; margin-bottom:18px; font-size:14px; border:1px solid #c3e6cb; }
        .token-box { background:#f8f9fa; border:1px solid #dee2e6; border-radius:6px; padding:12px; margin-top:10px; word-break:break-all; font-family:monospace; font-size:13px; }
        .auth-footer { text-align:center; margin-top:22px; font-size:14px; color:#7f8c8d; }
        .auth-footer a { color:#3498db; text-decoration:none; font-weight:bold; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-box">
        <div class="auth-logo">🔑</div>
        <div class="auth-title">Forgot Password</div>
        <div class="auth-sub">Enter your email to reset your password</div>

        <div th:if="${error}" class="alert-error" th:text="${error}"></div>

        <div th:if="${success}">
            <div class="alert-success" th:text="${success}"></div>
            <div th:if="${resetToken}">
                <p style="font-size:13px;color:#555;">Copy this token and use it to reset your password:</p>
                <div class="token-box" th:text="${resetToken}"></div>
                <br>
                <a th:href="@{/reset-password(token=${resetToken})}">
                    <button class="btn-submit" type="button">→ Go to Reset Password</button>
                </a>
            </div>
        </div>

        <form th:if="${success == null}" th:action="@{/forgot-password}" method="post">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your registered email" required autofocus>
            </div>
            <button type="submit" class="btn-submit">🔍 Find My Account</button>
        </form>

        <div class="auth-footer">
            <a href="/login">← Back to Login</a>
        </div>
    </div>
</div>
</body>
</html>
