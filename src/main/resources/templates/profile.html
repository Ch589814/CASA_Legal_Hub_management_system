<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Profile - CASA Legal Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            margin-bottom: 10px;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 12px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }
        .info-row:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateX(5px);
        }
        .info-label {
            color: #34495e;
            font-weight: 600;
            font-size: 14px;
        }
        .info-value {
            color: #2c3e50;
            font-weight: 500;
        }
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-admin {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }
        .badge-staff {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
        }
        .badge-active {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
        }
        .badge-inactive {
            background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
            color: white;
        }
        .password-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        .password-wrapper input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
        }
        .password-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }
        .toggle-pwd {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #7f8c8d;
            transition: all 0.3s ease;
        }
        .toggle-pwd:hover {
            color: #667eea;
            transform: translateY(-50%) scale(1.1);
        }
        label {
            display: block;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 8px;
            font-size: 14px;
        }
        button[type="submit"] {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.3);
        }
        .success-msg, .error-msg {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .success-msg {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
        }
        .error-msg {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }
        #pwdError {
            color: #e74c3c;
            font-size: 12px;
            margin-top: -15px;
            margin-bottom: 15px;
            padding: 8px 12px;
            background: rgba(231, 76, 60, 0.1);
            border-radius: 6px;
            border-left: 3px solid #e74c3c;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container">

    <div th:if="${success}" class="success-msg" th:text="${success}" style="margin-bottom:16px;"></div>
    <div th:if="${error}" class="error-msg" th:text="${error}" style="margin-bottom:16px;"></div>

    <div class="profile-grid">

        <!-- Account Info -->
        <div class="card">
            <h2>👤 My Account</h2>
            <div class="info-row">
                <span class="info-label">Full Name</span>
                <span class="info-value" th:text="${currentUser.fullName}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Email</span>
                <span class="info-value" th:text="${currentUser.email}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Role</span>
                <span th:text="${currentUser.role}"
                      th:classappend="${currentUser.role == 'ADMIN'} ? 'badge badge-admin' : 'badge badge-staff'"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Status</span>
                <span th:text="${currentUser.status}"
                      th:classappend="${currentUser.status == 'Active'} ? 'badge badge-active' : 'badge badge-inactive'"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Member Since</span>
                <span class="info-value" th:text="${currentUser.createdAt}"></span>
            </div>
        </div>

        <!-- Change Password -->
        <div class="card">
            <h2>🔐 Change Password</h2>
            <form th:action="@{/profile/change-password}" method="post" onsubmit="return validatePwdForm()">
                <div style="margin-bottom:14px;">
                    <label style="display:block; font-weight:bold; color:#555; margin-bottom:6px; font-size:14px;">Current Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="currentPassword" name="currentPassword" placeholder="Enter current password" required>
                        <button type="button" class="toggle-pwd" onclick="togglePwd('currentPassword', this)">👁</button>
                    </div>
                </div>
                <div style="margin-bottom:14px;">
                    <label style="display:block; font-weight:bold; color:#555; margin-bottom:6px; font-size:14px;">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="newPassword" name="newPassword" placeholder="Min 6 characters" required minlength="6">
                        <button type="button" class="toggle-pwd" onclick="togglePwd('newPassword', this)">👁</button>
                    </div>
                </div>
                <div style="margin-bottom:18px;">
                    <label style="display:block; font-weight:bold; color:#555; margin-bottom:6px; font-size:14px;">Confirm New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter new password" required minlength="6">
                        <button type="button" class="toggle-pwd" onclick="togglePwd('confirmPassword', this)">👁</button>
                    </div>
                    <span id="pwdError" style="color:#e74c3c; font-size:12px; display:none;">Passwords do not match.</span>
                </div>
                <button type="submit" style="background:#27ae60; color:white; padding:11px 24px; border:none; border-radius:6px; font-size:15px; font-weight:bold; cursor:pointer;">💾 Update Password</button>
            </form>
        </div>

    </div>
</div>

<script>
    function togglePwd(id, btn) {
        const input = document.getElementById(id);
        const hidden = input.type === 'password';
        input.type = hidden ? 'text' : 'password';
        btn.textContent = hidden ? '🙈' : '👁';
    }
    function validatePwdForm() {
        const np = document.getElementById('newPassword').value;
        const cp = document.getElementById('confirmPassword').value;
        const err = document.getElementById('pwdError');
        if (np !== cp) { err.style.display = 'block'; return false; }
        err.style.display = 'none';
        return true;
    }
    document.getElementById('confirmPassword').addEventListener('input', function() {
        const err = document.getElementById('pwdError');
        err.style.display = (this.value && this.value !== document.getElementById('newPassword').value) ? 'block' : 'none';
    });
</script>
</body>
</html>
