<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cases - CASA Legal Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        .btn-cancel {
            background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
        }
        .search-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 15px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
        }
        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #f8f9fa;
            font-size: 14px;
        }
        tr:hover {
            background-color: #f8f9fa;
        }
        .success-msg, .error-msg {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .success-msg {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
        }
        .error-msg {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }
        .field-error {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container">

    <div id="successMsg" class="success-msg" style="display:none;"></div>
    <div id="errorMsg" class="error-msg" style="display:none;"></div>

    <div class="card">
        <h2 id="formTitle">⚖️ Add New Case</h2>
        <form id="caseForm">
            <div class="form-grid">
                <div>
                    <label>Client</label>
                    <select id="clientId">
                        <option value="">-- Select Client --</option>
                        <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.fullName}"></option>
                    </select>
                    <span class="field-error" id="err-client"></span>

                    <label>Case Number</label>
                    <input type="text" id="caseNumber" placeholder="e.g. CASA-2024-001">
                    <span class="field-error" id="err-caseNumber"></span>

                    <label>Service Type</label>
                    <select id="caseServiceType">
                        <option value="">-- Select Service --</option>
                        <option>Notary Service</option>
                        <option>Mediation</option>
                        <option>Legal Consultation</option>
                        <option>Legal Representation</option>
                    </select>
                    <span class="field-error" id="err-serviceType"></span>

                    <label>Case Type</label>
                    <select id="caseType">
                        <option value="">-- Select Type --</option>
                        <option>Criminal</option>
                        <option>Civil</option>
                        <option>Family</option>
                        <option>Labour</option>
                        <option>Property</option>
                        <option>Immigration</option>
                        <option>Other</option>
                    </select>
                </div>
                <div>
                    <label>Status</label>
                    <select id="caseStatus">
                        <option>Open</option>
                        <option>In Progress</option>
                        <option>Pending</option>
                        <option>Closed</option>
                        <option>Won</option>
                        <option>Lost</option>
                    </select>

                    <label>Priority</label>
                    <select id="casePriority">
                        <option>Low</option>
                        <option selected>Normal</option>
                        <option>High</option>
                        <option>Urgent</option>
                    </select>

                    <label>Court Date</label>
                    <input type="date" id="courtDate">

                    <label>Description</label>
                    <textarea id="caseDescription" placeholder="Brief case description..."></textarea>
                </div>
            </div>
            <button type="submit">💾 Save Case</button>
            <button type="button" class="btn-cancel" onclick="cancelEdit()">✖ Cancel</button>
        </form>
    </div>

    <div class="card">
        <h2>📋 All Cases</h2>
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search by case # or type..." onkeyup="searchCases()">
        <br><br>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Case Number</th>
                    <th>Client</th>
                    <th>Service</th>
                    <th>Type</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Court Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="caseTableBody"></tbody>
        </table>
    </div>

</div>

<!-- Confirm Modal -->
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <p id="confirmMessage">Are you sure?</p>
        <div class="confirm-actions">
            <button class="btn-confirm-yes" id="confirmYes">Yes, Delete</button>
            <button class="btn-confirm-no" id="confirmNo">Cancel</button>
        </div>
    </div>
</div>

<script src="/js/cases.js"></script>
</body>
</html>
