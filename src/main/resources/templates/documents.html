<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Documents - CASA Legal Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container">

    <div id="successMsg" class="success-msg" style="display:none;"></div>
    <div id="errorMsg" class="error-msg" style="display:none;"></div>

    <div class="card">
        <h2>📄 Upload Document</h2>

        <form id="uploadForm">
            <div class="two-col">
                <div>
                    <label for="docCategory">Document Category *</label>
                    <select id="docCategory" onchange="handleCategoryChange()">
                        <option value="Client Document">📋 Client Document</option>
                        <option value="Case Document">📁 Case Document</option>
                        <option value="Staff Resource">👤 Staff Resource</option>
                    </select>
                    <span class="hint">Staff Resource = internal documents not linked to any client or case</span>

                    <div id="clientSection">
                        <label for="docClientId">Client <span id="clientRequired">*</span></label>
                        <select id="docClientId">
                            <option value="">-- Select Client --</option>
                            <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.fullName}"></option>
                        </select>
                        <span class="field-error" id="err-docClientId"></span>
                    </div>
                </div>
                <div>
                    <label for="docFile">Select File *</label>
                    <div style="position:relative;">
                        <input type="file" id="docFile" accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.txt" 
                               style="padding:10px; border:2px dashed #cbd5e0; background:#f8fafc; cursor:pointer;">
                    </div>
                    <span class="field-error" id="err-docFile"></span>
                    <span class="hint">Allowed: PDF, Word, Excel, Images, Text (max 20MB)</span>

                    <label for="docFileType">File Type</label>
                    <select id="docFileType">
                        <option>ID Document</option>
                        <option>Court Order</option>
                        <option>Contract</option>
                        <option>Affidavit</option>
                        <option>Invoice</option>
                        <option>Legal Notice</option>
                        <option>Policy Document</option>
                        <option>Template</option>
                        <option>Reference Material</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>

            <label for="docDescription">Description (optional)</label>
            <textarea id="docDescription" placeholder="Brief description of this document..." style="height:80px;"></textarea>

            <br>
            <div style="display:flex; justify-content:flex-end; margin-top:10px;">
                <button type="submit">📤 Save Document</button>
                <button type="button" class="btn-cancel" onclick="resetForm()">✖ Cancel</button>
            </div>
        </form>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:15px;">
            <h2 style="margin:0; border-bottom:none; padding-bottom:0;">📂 All Documents</h2>
            <input type="text" class="search-input" id="docSearch"
                   placeholder="Search documents..."
                   oninput="searchDocuments()" style="width:300px;">
        </div>

        <div class="tabs">
            <div class="tab active" onclick="filterTab('all', this)">📂 All</div>
            <div class="tab" onclick="filterTab('Client Document', this)">📋 Client Documents</div>
            <div class="tab" onclick="filterTab('Case Document', this)">📁 Case Documents</div>
            <div class="tab" onclick="filterTab('Staff Resource', this)">👤 Staff Resources</div>
        </div>

        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Category</th>
                        <th>File Name</th>
                        <th>Type</th>
                        <th>Client</th>
                        <th>Description</th>
                        <th>Upload Date</th>
                        <th style="text-align:right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="documentTableBody"></tbody>
            </table>
        </div>
    </div>

</div>


<script src="/js/documents.js"></script>
</body>
</html>
