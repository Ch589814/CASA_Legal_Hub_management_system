<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - CASA Legal Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { margin:0; padding:0; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; display:flex; flex-direction:column; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .auth-wrapper { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
        .auth-box { background:white; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.2); padding:50px; width:100%; max-width:450px; position:relative; overflow:hidden; }
        .auth-box::before { content:''; position:absolute; top:0; left:0; right:0; height:5px; background:linear-gradient(90deg,#667eea,#764ba2); }
        .auth-logo { text-align:center; font-size:60px; margin-bottom:15px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .auth-title { text-align:center; font-size:32px; font-weight:700; color:#2c3e50; margin-bottom:8px; }
        .auth-sub { text-align:center; color:#7f8c8d; font-size:16px; margin-bottom:35px; }
        .form-group { margin-bottom:25px; position:relative; }
        .form-group label { display:block; font-weight:600; color:#555; margin-bottom:8px; font-size:15px; }
        .form-group input { width:100%; padding:15px 20px; border:2px solid #e1e8ed; border-radius:12px; font-size:16px; box-sizing:border-box; transition:all 0.3s ease; background:#f8f9fa; }
        .form-group input:focus { outline:none; border-color:#667eea; background:white; box-shadow:0 0 0 3px rgba(102,126,234,0.1); }
        .btn-submit { width:100%; background:linear-gradient(135deg,#667eea,#764ba2); color:white; padding:16px; border:none; border-radius:12px; font-size:18px; font-weight:600; cursor:pointer; transition:all 0.3s ease; margin-top:10px; }
        .btn-submit:hover { transform:translateY(-2px); box-shadow:0 10px 25px rgba(102,126,234,0.3); }
        .btn-submit:active { transform:translateY(0); }
        .alert-error { background:linear-gradient(135deg,#ff6b6b,#ee5a52); color:white; padding:15px 20px; border-radius:12px; margin-bottom:25px; font-size:15px; border:none; box-shadow:0 5px 15px rgba(255,107,107,0.3); }
        .alert-success { background:linear-gradient(135deg,#51cf66,#40c057); color:white; padding:15px 20px; border-radius:12px; margin-bottom:25px; font-size:15px; border:none; box-shadow:0 5px 15px rgba(81,207,102,0.3); }
        .auth-footer { text-align:center; margin-top:30px; font-size:16px; color:#7f8c8d; }
        .auth-footer a { color:#667eea; text-decoration:none; font-weight:600; transition:color 0.3s ease; }
        .auth-footer a:hover { color:#764ba2; }
        .forgot-link { text-align:center; margin-top:15px; }
        .forgot-link a { color:#e74c3c; text-decoration:none; font-weight:600; font-size:15px; transition:color 0.3s ease; }
        .forgot-link a:hover { color:#c0392b; }
        .back-link { text-align:center; margin-top:20px; }
        .back-link a { color:#95a5a6; text-decoration:none; font-size:14px; transition:color 0.3s ease; }
        .back-link a:hover { color:#667eea; }
        .loading { display:none; }
        .loading.show { display:inline-block; width:20px; height:20px; border:2px solid #ffffff; border-radius:50%; border-top-color:transparent; animation:spin 1s ease-in-out infinite; margin-left:10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-box">
        <div class="auth-logo">⚖️</div>
        <div class="auth-title">CASA Legal Hub</div>
        <div class="auth-sub">Welcome back! Sign in to your account</div>

        <div th:if="${error}" class="alert-error">
            <strong>❌ Access Denied!</strong> <span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="alert-success">
            <strong>✅ Success!</strong> <span th:text="${success}"></span>
        </div>
        <div th:if="${logout}" class="alert-success">
            <strong>👋 Goodbye!</strong> <span th:text="${logout}"></span>
        </div>

        <form th:action="@{/login}" method="post" id="loginForm">
            <div class="form-group">
                <label for="email">📧 Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">🔐 Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">
                <span id="btnText">🔐 Sign In</span>
                <span class="loading" id="loading"></span>
            </button>
        </form>

        <div class="forgot-link">
            <a href="/forgot-password">🔑 Forgot your password?</a>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="/register">Create one here</a>
        </div>
        
        <div class="back-link">
            <a href="/">← Back to Welcome Page</a>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function() {
    const btn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const loading = document.getElementById('loading');
    
    btn.disabled = true;
    btnText.textContent = 'Signing in...';
    loading.classList.add('show');
});
</script>
</body>
</html>
