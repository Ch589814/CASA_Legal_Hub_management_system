<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - CASA Legal Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { margin: 0; padding: 0; background: linear-gradient(135deg, #1a252f 0%, #2c3e50 50%, #34495e 100%); min-height: 100vh; display: flex; flex-direction: column; }
        .auth-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .auth-box { background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); padding: 44px 50px; width: 100%; max-width: 440px; }
        .auth-logo { text-align: center; font-size: 40px; margin-bottom: 6px; }
        .auth-title { text-align: center; font-size: 22px; font-weight: bold; color: #2c3e50; margin-bottom: 4px; }
        .auth-sub { text-align: center; color: #7f8c8d; font-size: 13px; margin-bottom: 28px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: bold; color: #555; margin-bottom: 6px; font-size: 14px; }
        .form-group input { width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; transition: border 0.2s; }
        .form-group input:focus { outline: none; border-color: #3498db; }
        .btn-submit { width: 100%; background: #27ae60; color: white; padding: 13px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 6px; }
        .btn-submit:hover { background: #219a52; }
        .alert-error { background: #f8d7da; color: #721c24; padding: 10px 14px; border-radius: 6px; margin-bottom: 18px; font-size: 14px; border: 1px solid #f5c6cb; }
        .note { background: #fff3cd; color: #856404; padding: 10px 14px; border-radius: 6px; margin-bottom: 18px; font-size: 13px; border: 1px solid #ffc107; }
        .auth-footer { text-align: center; margin-top: 22px; font-size: 14px; color: #7f8c8d; }
        .auth-footer a { color: #3498db; text-decoration: none; font-weight: bold; }
        .back-link { text-align: center; margin-top: 14px; font-size: 13px; }
        .back-link a { color: #7f8c8d; text-decoration: none; }
        .back-link a:hover { color: #3498db; }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-box">

        <div class="auth-logo">⚖️</div>
        <div class="auth-title">Create Account</div>
        <div class="auth-sub">Join CASA Legal Hub</div>

        <div th:if="${error}" class="alert-error" th:text="${error}"></div>

        <form th:action="@{/register}" method="post" th:object="${user}">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password (min 6 chars)" required minlength="6">
            </div>
            <button type="submit" class="btn-submit">✅ Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Login here</a>
        </div>
        <div class="back-link">
            <a href="/">← Back to Welcome Page</a>
        </div>

    </div>
</div>

</body>
</html>
