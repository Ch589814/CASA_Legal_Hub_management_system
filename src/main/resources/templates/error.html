<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error - CASA Legal Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { margin: 0; padding: 0; background: linear-gradient(135deg, #1a252f 0%, #2c3e50 50%, #34495e 100%); min-height: 100vh; display: flex; flex-direction: column; }
        .error-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .error-box { background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); padding: 44px 50px; width: 100%; max-width: 480px; text-align: center; }
        .error-icon { font-size: 60px; margin-bottom: 16px; }
        .error-code { font-size: 64px; font-weight: bold; color: #e74c3c; margin-bottom: 8px; }
        .error-title { font-size: 20px; font-weight: bold; color: #2c3e50; margin-bottom: 12px; }
        .error-message { color: #7f8c8d; font-size: 14px; margin-bottom: 28px; }
        .btn-home { display: inline-block; background: #3498db; color: white; padding: 12px 28px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 15px; }
        .btn-home:hover { background: #2980b9; }
        .btn-back { display: inline-block; margin-left: 12px; color: #7f8c8d; font-size: 14px; text-decoration: none; }
        .btn-back:hover { color: #3498db; }
    </style>
</head>
<body>
<div class="error-wrapper">
    <div class="error-box">
        <div class="error-icon">⚖️</div>
        <div class="error-code" th:text="${errorCode} ?: '500'"></div>
        <div class="error-title" th:text="${errorCode == 404} ? 'Page Not Found' : 'Something Went Wrong'"></div>
        <div class="error-message" th:text="${errorMessage} ?: 'An unexpected error occurred. Please try again.'"></div>
        <a href="/dashboard" class="btn-home">🏠 Go to Dashboard</a>
        <a href="javascript:history.back()" class="btn-back">← Go Back</a>
    </div>
</div>
</body>
</html>
